<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAISON DU SPORT | Coming Soon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #ffffff;
            margin: 0;
            overflow-x: hidden;
        }

        /* High-impact Stadium Hero */
        .stadium-hero {
            background-image: 
                linear-gradient(to bottom, rgba(5, 5, 5, 0.4), rgba(5, 5, 5, 1)), 
                url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2?q=80&w=2070&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .glow-text {
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.4);
        }

        /* Grid for technical aesthetic */
        .grid-overlay {
            background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        /* Top Right Logo Styling */
        .brand-logo {
            position: fixed;
            top: 2rem;
            right: 2rem;
            z-index: 50;
            width: 60px; /* Adjust size as needed */
            height: auto;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .brand-logo:hover {
            transform: scale(1.05);
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <img src="LOGO.jpeg" alt="MDS Logo" class="brand-logo">

    <section class="stadium-hero relative h-screen flex items-center justify-center">
        <div class="absolute inset-0 grid-overlay"></div>
        <h1 class="text-6xl md:text-9xl font-black tracking-tighter glow-text z-10 text-center uppercase">
            MAISON DU SPORT
        </h1>
    </section>

    <section class="h-screen flex items-center justify-center px-8 border-b border-white/5">
        <div class="text-3xl md:text-6xl font-light italic text-center max-w-4xl tracking-tight leading-tight opacity-90">
            “The Game Returns.”
        </div>
    </section>

    <section class="h-screen flex items-center justify-center px-8 bg-[#080808]">
        <div class="text-3xl md:text-6xl font-light italic text-center max-w-5xl tracking-tight leading-tight opacity-90">
            “Building a home for Haitian football.”
        </div>
    </section>

    <section class="h-screen flex flex-col items-center justify-center border-t border-white/5">
        <h2 class="text-5xl md:text-[10rem] font-black tracking-[0.2em] uppercase text-white animate-pulse">
            Soon
        </h2>
        <p class="mt-4 text-gray-500 tracking-[0.5em] uppercase text-xs font-bold">The Evolution of Excellence</p>
    </section>

    <footer class="py-24 flex flex-col items-center justify-center bg-black border-t border-white/10 relative overflow-hidden">
        <h2 class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-[25vw] font-black opacity-5 pointer-events-none tracking-tighter">
            MAISON
        </h2>
        
        <div class="z-10 flex flex-col md:flex-row items-center gap-10 text-xs tracking-[0.3em] uppercase font-bold text-gray-400">
            <a href="https://www.instagram.com/mdshaiti" target="_blank" class="hover:text-white transition-all hover:tracking-[0.4em]">
                Instagram
            </a>
            <a href="https://www.facebook.com/MaisonDuSport" target="_blank" class="hover:text-white transition-all hover:tracking-[0.4em]">
                Facebook
            </a>
            <a href="mailto:contactmaisondusport@gmail.com" class="hover:text-white transition-all hover:tracking-[0.4em] lowercase font-normal italic">
                contactmaisondusport@gmail.com
            </a>
        </div>
    </footer>

</body>
</html>
