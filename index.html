<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAISON DU SPORT | Coming Soon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #ffffff;
            margin: 0;
            overflow-x: hidden;
        }

        /* Film Grain Overlay for Texture */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Noise_Texture.png');
            opacity: 0.04;
            pointer-events: none;
            z-index: 100;
        }

        .stadium-parallax {
            background-image: 
                linear-gradient(to bottom, rgba(5, 5, 5, 0.4), rgba(5, 5, 5, 1)), 
                url('https://images.unsplash.com/photo-1522778119026-d647f0596c20?q=80&w=2070&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 120vh; /* Extra height for smooth scroll */
        }

        .outline-text {
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.3);
            color: transparent;
        }

        .brand-logo {
            position: fixed;
            top: 2rem;
            right: 2rem;
            z-index: 50;
            width: 70px;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Moving glow effect */
        .hype-glow {
            position: absolute;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <img src="LOGO.JPEG" alt="MDS Logo" class="brand-logo">

    <section class="relative h-screen flex items-center justify-center stadium-parallax">
        <div class="hype-glow"></div>
        <div class="z-10 text-center" data-aos="zoom-out" data-aos-duration="2000">
            <h1 class="text-7xl md:text-[10rem] font-black tracking-tighter uppercase leading-none">
                MAISON <br> <span class="outline-text">DU SPORT</span>
            </h1>
            <p class="mt-8 tracking-[1em] text-xs uppercase opacity-50">Private Holding Company</p>
        </div>
    </section>

    <section class="h-screen flex items-center justify-center px-8 bg-black relative">
        <div class="absolute left-10 text-[10vw] font-black opacity-5 select-none outline-text">01</div>
        <div class="z-10 text-4xl md:text-7xl font-light italic text-center max-w-5xl tracking-tight" 
             data-aos="fade-up" data-aos-duration="1200">
            “The Game Returns.”
        </div>
    </section>

    <section class="h-screen flex items-center justify-center px-8 bg-[#050505] relative">
        <div class="absolute right-10 text-[10vw] font-black opacity-5 select-none outline-text">02</div>
        <div class="z-10 text-3xl md:text-6xl font-bold uppercase text-center max-w-6xl tracking-tighter" 
             data-aos="fade-up" data-aos-duration="1200">
            Building a <span class="bg-white text-black px-4 italic">home</span> for Haitian football.
        </div>
    </section>

    <section class="h-[120vh] flex flex-col items-center justify-center relative overflow-hidden">
        <div class="text-[25vw] font-black opacity-[0.02] absolute leading-none">MDS</div>
        <h2 class="text-6xl md:text-[12rem] font-black tracking-tighter uppercase leading-none z-10" 
            data-aos="reveal-type" data-aos-duration="1500">
            SOON.
        </h2>
        <div class="w-24 h-[1px] bg-white my-10 opacity-30"></div>
        <p class="tracking-[0.8em] text-xs uppercase opacity-40">The Evolution of Excellence</p>
    </section>

    <footer class="py-32 flex flex-col items-center justify-center bg-black border-t border-white/5 relative">
        <div class="flex flex-col md:flex-row items-center gap-12 text-[10px] tracking-[0.5em] uppercase font-bold text-gray-500 z-10">
            <a href="https://www.instagram.com/mdshaiti" target="_blank" class="hover:text-white transition-all">Instagram</a>
            <a href="https://www.facebook.com/MaisonDuSport" target="_blank" class="hover:text-white transition-all">Facebook</a>
            <a href="mailto:contactmaisondusport@gmail.com" class="hover:text-white transition-all lowercase italic font-normal tracking-widest">contactmaisondusport@gmail.com</a>
        </div>
        <div class="mt-20 opacity-10 text-[12vw] font-black tracking-tighter select-none">MAISON</div>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({
            once: false,
            mirror: true
        });
    </script>
</body>
</html>
