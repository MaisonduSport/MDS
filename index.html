<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAISON DU SPORT | Premium Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #fff;
            margin: 0;
        }

        .mds-display { font-family: 'Syncopate', sans-serif; text-transform: uppercase; }

        /* Stadium Header */
        .stadium-hero {
            background-image: 
                linear-gradient(to bottom, rgba(5, 5, 5, 0.4) 0%, rgba(5, 5, 5, 1) 100%), 
                url('https://images.unsplash.com/photo-1522778119026-d647f0596c20?q=80&w=2070&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* Structured Product Cards */
        .product-card {
            background: #0f0f0f;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .product-card:hover {
            border-color: rgba(255,255,255,0.2);
            transform: translateY(-5px);
        }

        .brand-divider {
            border-left: 4px solid #fff;
            padding-left: 1.5rem;
        }

        .tag {
            font-size: 9px;
            letter-spacing: 0.2em;
            padding: 4px 12px;
            border-radius: 2px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .tag-nike { background: #fff; color: #000; }
        .tag-adidas { background: #0051FF; color: #fff; }

        .outline-text {
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.2);
            color: transparent;
        }
    </style>
</head>
<body>

    <section class="stadium-hero h-screen flex flex-col items-center justify-center text-center px-6">
        <div class="z-10" data-aos="fade-up" data-aos-duration="1500">
            <h1 class="mds-display text-6xl md:text-[9rem] font-black leading-none tracking-tighter">
                MAISON <br> <span class="outline-text">DU SPORT</span>
            </h1>
            <p class="mt-8 tracking-[1.2em] text-[10px] md:text-xs uppercase opacity-60">L'Excellence du Jeu</p>
        </div>
    </section>

    <section class="bg-black py-24 px-6 md:px-12">
        
        <div class="mb-20">
            <div class="brand-divider mb-12" data-aos="fade-right">
                <span class="text-xs tracking-[0.5em] text-gray-500 uppercase">Department 01</span>
                <h2 class="mds-display text-4xl md:text-6xl">Nike Performance</h2>
            </div>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                <script>
                    for(let i=1; i<=10; i++) {
                        document.write(`
                            <div class="product-card p-6 group cursor-pointer" data-aos="fade-up">
                                <div class="flex justify-between items-start mb-8">
                                    <span class="tag tag-nike">Nike</span>
                                    <span class="text-[10px] text-gray-600 font-mono">#NK-2026-${i}</span>
                                </div>
                                <div class="aspect-square flex items-center justify-center mb-6">
                                    <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=500&auto=format" class="w-full h-full object-contain opacity-80 group-hover:opacity-100 transition-opacity">
                                </div>
                                <h3 class="mds-display text-sm mb-1">Nike Elite Silhouette</h3>
                                <p class="text-[10px] tracking-widest text-gray-500 uppercase">Firm Ground / Pro Edition</p>
                            </div>
                        `);
                    }
                </script>
            </div>
        </div>

        <div>
            <div class="brand-divider mb-12 border-blue-600" data-aos="fade-right">
                <span class="text-xs tracking-[0.5em] text-gray-500 uppercase">Department 02</span>
                <h2 class="mds-display text-4xl md:text-6xl">Adidas Football</h2>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                <script>
                    for(let i=1; i<=9; i++) {
                        document.write(`
                            <div class="product-card p-6 group cursor-pointer" data-aos="fade-up">
                                <div class="flex justify-between items-start mb-8">
                                    <span class="tag tag-adidas">Adidas</span>
                                    <span class="text-[10px] text-gray-600 font-mono">#AD-2026-${i}</span>
                                </div>
                                <div class="aspect-square flex items-center justify-center mb-6">
                                    <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=500&auto=format" class="w-full h-full object-contain opacity-80 group-hover:opacity-100 transition-opacity">
                                </div>
                                <h3 class="mds-display text-sm mb-1">Adidas Elite Silhouette</h3>
                                <p class="text-[10px] tracking-widest text-gray-500 uppercase">Turf / Professional</p>
                            </div>
                        `);
                    }
                </script>
            </div>
        </div>
    </section>

    <footer class="bg-[#030303] py-20 px-10 border-t border-white/5">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-10">
            <div class="text-center md:text-left">
                <div class="mds-display text-2xl mb-2">MDS</div>
                <p class="text-[9px] tracking-[0.4em] uppercase text-gray-600">The Future of Haitian Sport.</p>
            </div>
            <div class="flex gap-8">
                <a href="#" class="text-[10px] tracking-widest uppercase hover:text-white transition-colors">Instagram</a>
                <a href="#" class="text-[10px] tracking-widest uppercase hover:text-white transition-colors">WhatsApp</a>
            </div>
        </div>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: true });
    </script>
</body>
</html>
