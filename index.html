<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MAISON DU SPORT | The Archive</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;400&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #020202;
            color: #fcfcfc;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Luxury Grain Texture Overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.05;
            pointer-events: none;
        }

        .container {
            text-align: center;
            z-index: 1;
        }

        .brand-name {
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 200;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin: 0;
            line-height: 1;
            /* Text reveal animation */
            animation: reveal 3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .tagline {
            margin-top: 40px;
            font-size: 0.75rem;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            color: #888;
            opacity: 0;
            animation: fadeIn 2s 1s ease-in forwards;
        }

        @keyframes reveal {
            from { opacity: 0; transform: translateY(20px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="brand-name">Maison du Sport</h1>
        <div class="tagline">Forthcoming</div>
    </div>

</body>
</html>
