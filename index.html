<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAISON DU SPORT | Coming Soon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #ffffff;
            overflow-x: hidden;
        }

        .gradient-bg {
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #050505 100%);
        }

        .glow-text {
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        /* Animated background lines */
        .line {
            position: absolute;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            height: 1px;
            width: 100%;
            animation: moveLines 8s linear infinite;
        }

        @keyframes moveLines {
            0% { transform: translateY(-100vh); }
            100% { transform: translateY(100vh); }
        }
    </style>
</head>
<body class="gradient-bg">

    <section class="relative h-screen flex items-center justify-center overflow-hidden">
        <div class="line" style="top: 20%; animation-delay: 0s;"></div>
        <div class="line" style="top: 50%; animation-delay: 2s;"></div>
        <div class="line" style="top: 80%; animation-delay: 4s;"></div>
        
        <h1 class="text-6xl md:text-9xl font-black tracking-tighter glow-text z-10 text-center">
            MAISON DU SPORT
        </h1>
    </section>

    <section class="h-screen flex items-center justify-center px-6">
        <div id="quote-container" class="text-2xl md:text-4xl font-light italic text-center max-w-3xl">
            </div>
    </section>

    <section class="h-screen flex flex-col items-center justify-center">
        <h2 class="text-5xl md:text-8xl font-bold tracking-widest uppercase animate-pulse">
            Coming Soon
        </h2>
        <p class="mt-4 text-gray-500 tracking-widest uppercase text-sm">The Evolution of Haitian Excellence</p>
    </section>

    <footer class="py-20 flex flex-col items-center justify-center border-t border-white/5">
        <h2 class="text-[15vw] font-black leading-none opacity-10 select-none">MAISON</h2>
        
        <div class="flex flex-col md:flex-row gap-8 mt-10 text-sm tracking-widest uppercase text-gray-400">
            <a href="#" class="hover:text-white transition-colors">Instagram</a>
            <a href="#" class="hover:text-white transition-colors">Facebook</a>
            <a href="tel:+123456789" class="hover:text-white transition-colors">+509 PHONE NUMBER</a>
        </div>
    </footer>

    <script>
        // Simple Quote Cycle Script
        const quotes = [
            "The Game Returns.",
            "Building the Future of Haitian Sports.",
            "Something Big is Coming."
        ];
        
        let currentQuote = 0;
        const quoteElement = document.getElementById('quote-container');

        function updateQuote() {
            quoteElement.style.opacity = 0;
            quoteElement.style.transform = "translateY(20px)";
            quoteElement.style.transition = "all 1s ease";

            setTimeout(() => {
                quoteElement.innerText = quotes[currentQuote];
                quoteElement.style.opacity = 1;
                quoteElement.style.transform = "translateY(0)";
                currentQuote = (currentQuote + 1) % quotes.length;
            }, 1000);
        }

        setInterval(updateQuote, 4000);
        updateQuote(); // Init
    </script>
</body>
</html>
