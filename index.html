<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maison du Sport</title>
  <style>
    /* Reset & basic styles */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { height: 100%; font-family: 'Arial', sans-serif; background: #111; color: #fff; }

    /* Hero Section */
    .hero {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      background: linear-gradient(135deg, #1a1a1a, #222);
      position: relative;
      overflow: hidden;
    }
    .hero h1 {
      font-size: 4rem;
      letter-spacing: 3px;
      margin-bottom: 20px;
    }

    /* Animated quotes */
    .quotes {
      font-size: 1.5rem;
      height: 2rem;
      margin-bottom: 50px;
      opacity: 0;
      transition: opacity 0.5s;
    }

    /* Coming Soon */
    .coming-soon {
      font-size: 2rem;
      font-weight: bold;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Footer */
    footer {
      background: #000;
      text-align: center;
      padding: 40px 20px 20px;
      color: #fff;
      position: relative;
    }
    footer .footer-maison {
      font-size: 3rem;
      font-weight: bold;
      margin-bottom: 10px;
    }
    footer .socials {
      margin-top: 10px;
      font-size: 1rem;
    }
    footer .socials span {
      margin: 0 15px;
      cursor: pointer;
      transition: color 0.3s;
    }
    footer .socials span:hover {
      color: #f39c12;
    }
  </style>
</head>
<body>

  <!-- Hero Section -->
  <section class="hero">
    <h1>MAISON DU SPORT</h1>
    <div class="quotes" id="quote">The Game Returns.</div>
    <div class="coming-soon">Coming Soon</div>
  </section>

  <!-- Footer -->
  <footer>
    <div class="footer-maison">MAISON</div>
    <div class="socials">
      <span>Instagram</span>
      <span>Facebook</span>
      <span>+509 1234 5678</span>
    </div>
  </footer>

  <!-- JavaScript for animated quotes -->
  <script>
    const quotes = [
      "The Game Returns.",
      "Building the Future of Haitian Sports.",
      "Something Big is Coming."
    ];
    let current = 0;
    const quoteEl = document.getElementById("quote");

    function showNextQuote() {
      quoteEl.style.opacity = 0;
      setTimeout(() => {
        quoteEl.textContent = quotes[current];
        quoteEl.style.opacity = 1;
        current = (current + 1) % quotes.length;
      }, 500);
    }

    setInterval(showNextQuote, 3000);
  </script>

</body>
</html>
