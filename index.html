<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        /* The Concrete Environment */
        body { 
            margin: 0; 
            background: #f0f0f0; /* Not black, but cold, industrial grey */
            color: #050505; 
            font-family: 'Syne', sans-serif;
            overflow-x: hidden;
        }

        /* Kinetic Typography Layer */
        .fragment {
            position: absolute;
            font-size: 15vw;
            font-weight: 900;
            text-transform: uppercase;
            pointer-events: none;
            mix-blend-mode: multiply;
        }

        .scroll-trigger { height: 100vh; position: relative; }
    </style>
</head>
<body>

    <div class="scroll-trigger">
        <h1 class="fragment" id="ms">MAISON<br>DU SPORT</h1>
    </div>

    <section style="height: 200vh; padding: 20vh 10vw;">
        <h2 style="font-size: 5vw; line-height: 1.1;">Haitian football is not dead. <br>It is just waiting for the architect.</h2>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        // High-end motion: Fragments coming together
        gsap.to("#ms", { 
            scrollTrigger: { scrub: 2 },
            scale: 0.5,
            rotation: 10,
            opacity: 0
        });
    </script>
</body>
</html>
