<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        .stage { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        
        .morph-text { font-size: 3rem; font-weight: 200; letter-spacing: 0.1em; transition: all 1.5s ease-in-out; }

        .quote { font-size: 1.5rem; color: #888; max-width: 600px; margin: 50px auto; opacity: 0; transform: translateY(30px); transition: all 1s ease-out; }
        
        .active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <section class="stage">
        <div id="hero-text" class="morph-text">WELCOME TO MAISON DU SPORT</div>
    </section>

    <section class="stage">
        <div class="quote">"Haitian football was once our heartbeat, now it is a whisper."</div>
    </section>

    <section class="stage">
        <div class="quote">"We are not here to watch the decay. We are here to architect the return."</div>
    </section>

    <section class="stage">
        <div id="footer-text" class="morph-text">COMING SOON</div>
    </section>

    <script>
        // Trigger reveal on scroll
        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('active');
            });
        });
        document.querySelectorAll('.quote').forEach(q => observer.observe(q));
    </script>
</body>
</html>
