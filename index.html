<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAISON DU SPORT | Evolution</title>
    <style>
        :root {
            --bg: #050505;
            --text: #ffffff;
            --accent: #e5e5e5;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow-x: hidden;
            cursor: crosshair;
        }

        /* The Interactive Spotlight */
        #cursor-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            opacity: 0;
            animation: fadeIn 2s ease-out forwards;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h1 {
            font-size: clamp(4rem, 15vw, 12rem);
            font-weight: 900;
            margin: 0;
            letter-spacing: -0.06em;
            line-height: 0.9;
        }

        .tagline {
            font-size: clamp(1rem, 2vw, 1.5rem);
            letter-spacing: 0.6em;
            text-transform: uppercase;
            margin-top: 30px;
            color: var(--accent);
        }

        .scroll-hint {
            position: absolute;
            bottom: 40px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            opacity: 0.4;
        }
    </style>
</head>
<body>

    <div id="cursor-glow"></div>

    <section class="hero">
        <h1>MAISON<br>DU SPORT</h1>
        <div class="tagline">The Game Returns</div>
        <div class="scroll-hint">Scroll to discover</div>
    </section>

    <script>
        // Move the glow with the cursor
        const glow = document.getElementById('cursor-glow');
        document.addEventListener('mousemove', (e) => {
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });
    </script>
</body>
</html>
